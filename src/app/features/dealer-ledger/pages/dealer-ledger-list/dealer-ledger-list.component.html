<div class="dealer-ledger-list">
  <app-dealer-ledger-toolbar
    class="dealer-ledger-list__header"
    [totalCount]="store.filteredCount()"
    [loading]="store.loading()"
  />

  <app-dealer-ledger-filter
    class="dealer-ledger-list__filters"
    checkboxMode="single"
    checkboxGroupLabel="Transaction Type"
    (searched)="onSearch($event)"
    (reset)="onReset()"
  />

  @if (store.error(); as error) {
    <div class="dealer-ledger-list__error" role="alert">
      <p>{{ error }}</p>
      <button type="button" (click)="onRetry()">Retry</button>
    </div>
  }

  <app-dealer-ledger-summary-cards
    class="dealer-ledger-list__summary"
    [summary]="store.summary()"
    [loading]="store.loading()"
  />

  <app-dealer-ledger-table
    class="dealer-ledger-list__table"
    [rows]="store.data()"
    [loading]="store.loading()"
  />
</div>
